<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup – Planifier une réunion (avec nombre d'intervenants)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #e5e5e5;
  }

  /* Overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }

  /* Modal */
  .modal {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-header h2 {
    font-size: 18px;
    font-weight: 700;
  }
  .close-btn {
    background: none; border: none; color: #888;
    font-size: 20px; cursor: pointer; padding: 4px;
  }
  .close-btn:hover { color: #ccc; }

  /* Form */
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #ccc;
  }
  .form-group input[type="text"],
  .form-group input[type="date"],
  .form-group input[type="time"],
  .form-group input[type="number"],
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: #e5e5e5;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.25);
  }
  .form-group textarea { resize: none; }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: #666; }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Hint text */
  .hint {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .hint svg { flex-shrink: 0; }

  /* Optional badge */
  .optional-badge {
    font-size: 11px;
    font-weight: 400;
    color: #888;
    margin-left: 6px;
  }

  /* Num speakers field - highlighted */
  .num-speakers-group {
    background: #1e1e2e;
    border: 1px solid #3b3b5c;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .num-speakers-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #c5c5e0;
  }
  .num-speakers-group .icon {
    color: #818cf8;
  }
  .num-speakers-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .num-speakers-input-row input[type="number"] {
    width: 100px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: #e5e5e5;
    font-size: 14px;
    outline: none;
    text-align: center;
  }
  .num-speakers-input-row input[type="number"]:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.25);
  }
  .num-speakers-input-row .auto-label {
    font-size: 13px;
    color: #888;
  }

  /* Participant section */
  .participants-section select {
    margin-bottom: 12px;
  }

  .contact-list {
    border: 1px solid #333;
    border-radius: 8px;
    max-height: 180px;
    overflow-y: auto;
  }
  .contact-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid #333;
    background: rgba(255,255,255,0.03);
  }
  .contact-list-header a {
    font-size: 12px;
    color: #818cf8;
    cursor: pointer;
    text-decoration: none;
  }
  .contact-list-header a:hover { text-decoration: underline; }
  .contact-list-header span {
    font-size: 12px;
    color: #888;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
  }
  .contact-item:last-child { border-bottom: none; }
  .contact-item:hover { background: rgba(255,255,255,0.03); }

  .contact-item input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: #6366f1;
    cursor: pointer;
  }
  .contact-info {
    flex: 1;
    min-width: 0;
  }
  .contact-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .contact-role {
    font-size: 11px;
    color: #888;
  }
  .enrollment-badge {
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .badge-enrolled { color: #34d399; }
  .badge-pending { color: #f59e0b; }
  .badge-none { color: #888; }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #6366f1;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #5558e6; }

  /* Annotation markers */
  .new-marker {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #22c55e22;
    color: #4ade80;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="overlay">
  <div class="modal">
    <!-- Header -->
    <div class="modal-header">
      <h2>Planifier une réunion</h2>
      <button class="close-btn">&times;</button>
    </div>

    <!-- Form -->
    <form>
      <!-- Title -->
      <div class="form-group">
        <label>Titre</label>
        <input type="text" placeholder="Ex: Conseil municipal du 15 mars" value="Conseil municipal du 15 mars" />
      </div>

      <!-- Date + Time -->
      <div class="grid-2 form-group">
        <div>
          <label>Date</label>
          <input type="date" value="2026-03-15" />
        </div>
        <div>
          <label>Heure</label>
          <input type="time" value="14:00" />
        </div>
      </div>

      <!-- Location -->
      <div class="form-group">
        <label>Lieu</label>
        <input type="text" placeholder="Ex: Salle du conseil" value="Salle du conseil" />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label>Description <span class="optional-badge">optionnel</span></label>
        <textarea rows="2" placeholder="Notes, ordre du jour...">Ordre du jour : budget 2026, projets d'infrastructure</textarea>
      </div>

      <!-- ═══ NEW: Nombre d'intervenants ═══ -->
      <div class="num-speakers-group">
        <label>
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Nombre d'intervenants
          <span class="optional-badge">optionnel</span>
          <span class="new-marker">nouveau</span>
        </label>
        <div class="num-speakers-input-row">
          <input type="number" min="1" max="50" placeholder="—" />
          <span class="auto-label">personnes qui prendront la parole</span>
        </div>
        <div class="hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          Laisser vide pour une détection automatique (recommandé si incertain)
        </div>
      </div>

      <!-- Participants -->
      <div class="form-group participants-section">
        <label>Participants</label>
        <select>
          <option>Groupe : Conseil Municipal (12 contacts)</option>
          <option>-- Sélectionner un groupe --</option>
        </select>

        <div class="contact-list">
          <div class="contact-list-header">
            <a>Tout désélectionner</a>
            <span>12 sélectionné(s)</span>
          </div>

          <label class="contact-item">
            <input type="checkbox" checked />
            <div class="contact-info">
              <div class="contact-name">Jean DUPONT</div>
              <div class="contact-role">Maire</div>
            </div>
            <span class="enrollment-badge badge-enrolled">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
              Enrollé
            </span>
          </label>

          <label class="contact-item">
            <input type="checkbox" checked />
            <div class="contact-info">
              <div class="contact-name">Marie MARTIN</div>
              <div class="contact-role">1ère adjointe</div>
            </div>
            <span class="enrollment-badge badge-enrolled">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
              Enrollé
            </span>
          </label>

          <label class="contact-item">
            <input type="checkbox" checked />
            <div class="contact-info">
              <div class="contact-name">Pierre DURAND</div>
              <div class="contact-role">2ème adjoint</div>
            </div>
            <span class="enrollment-badge badge-pending">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
              En attente
            </span>
          </label>

          <label class="contact-item">
            <input type="checkbox" checked />
            <div class="contact-info">
              <div class="contact-name">Sophie BERNARD</div>
              <div class="contact-role">Conseillère</div>
            </div>
            <span class="enrollment-badge badge-none">Pas de profil</span>
          </label>

          <label class="contact-item">
            <input type="checkbox" checked />
            <div class="contact-info">
              <div class="contact-name">Luc MOREAU</div>
              <div class="contact-role">Conseiller</div>
            </div>
            <span class="enrollment-badge badge-enrolled">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
              Enrollé
            </span>
          </label>

          <label class="contact-item">
            <input type="checkbox" checked />
            <div class="contact-info">
              <div class="contact-name">Isabelle PETIT</div>
              <div class="contact-role">Directrice générale des services</div>
            </div>
            <span class="enrollment-badge badge-none">Pas de profil</span>
          </label>
        </div>
      </div>

      <!-- Submit -->
      <button type="button" class="submit-btn">Planifier la réunion</button>
    </form>
  </div>
</div>

</body>
</html>
