# ============================================================================
#  ScribIA v2 — Docker Compose
#
#  Profils disponibles :
#    docker-compose up                         → front + back + ollama (tout local)
#    docker-compose --profile db up            → + base de données SQL Server locale
#    docker-compose up backend frontend        → front + back (db + ollama externes)
#    docker-compose up frontend                → front seul (back + db + ollama ailleurs)
# ============================================================================

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["db"]                           # Ne démarre que si --profile db ou si depends_on
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-ScribIA_Dev_2026!}"
      MSSQL_PID: "Developer"
    ports:
      - "${DB_EXPOSED_PORT:-1434}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11435}:11434"     # 11435 pour ne pas conflicte avec un ollama local
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build: ./backend
    env_file: .env
    environment:
      SCRIBIA_DB_HOST: "${SCRIBIA_DB_HOST:-db}"
      SCRIBIA_DB_PORT: "${SCRIBIA_DB_PORT:-1433}"
      SCRIBIA_DB_NAME: "${SCRIBIA_DB_NAME:-scribia}"
      SCRIBIA_DB_USER: "${SCRIBIA_DB_USER:-sa}"
      SCRIBIA_DB_PASSWORD: "${DB_PASSWORD:-ScribIA_Dev_2026!}"
      SCRIBIA_JWT_SECRET: "${JWT_SECRET:-CHANGE-ME-IN-PRODUCTION}"
      SCRIBIA_CORS_ORIGINS: "${SCRIBIA_CORS_ORIGINS:-http://localhost:3001,http://localhost:5173}"
      SCRIBIA_OLLAMA_URL: "${SCRIBIA_OLLAMA_URL:-http://ollama:11434}"
      # SCRIBIA_HF_TOKEN passé directement via env_file: .env
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend:/app
      - audio_data:/data/audio
      - prep_docs:/data/prep_docs
      - ai_docs:/data/ai_docs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  chroma:
    image: chromadb/chroma:0.6.3
    ports:
      - "${CHROMA_PORT:-8100}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - IS_PERSISTENT=TRUE

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3001}:80"

volumes:
  mssql_data:
  audio_data:
  prep_docs:
  ai_docs:
  ollama_data:
  chroma_data:
