# ============================================================================
#  ScribIA v2 — Docker Compose
#
#  Profils disponibles :
#    docker-compose up                         → front + back + db (tout local)
#    docker-compose up backend frontend        → front + back (db externe)
#    docker-compose up frontend                → front seul (back + db ailleurs)
#    docker-compose --profile db up            → explicitement avec db
# ============================================================================

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["db"]                           # Ne démarre que si --profile db ou si depends_on
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-ScribIA_Dev_2026!}"
      MSSQL_PID: "Developer"
    ports:
      - "${DB_EXPOSED_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    env_file: .env
    environment:
      SCRIBIA_DB_HOST: "${SCRIBIA_DB_HOST:-db}"
      SCRIBIA_DB_PORT: "${SCRIBIA_DB_PORT:-1433}"
      SCRIBIA_DB_NAME: "${SCRIBIA_DB_NAME:-scribia}"
      SCRIBIA_DB_USER: "${SCRIBIA_DB_USER:-sa}"
      SCRIBIA_DB_PASSWORD: "${DB_PASSWORD:-ScribIA_Dev_2026!}"
      SCRIBIA_JWT_SECRET: "${JWT_SECRET:-CHANGE-ME-IN-PRODUCTION}"
      SCRIBIA_CORS_ORIGINS: "${SCRIBIA_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mssql_data:
