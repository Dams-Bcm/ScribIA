# ============================================================================
#  ScribIA v2 — Docker Compose
#
#  Profils disponibles :
#    docker-compose up                         → front + back + ollama (tout local)
#    docker-compose --profile db up            → + base de données SQL Server locale
#    docker-compose --profile rag up           → + Redis + Qdrant + MinIO (infra RAG-API)
#    docker-compose --profile db --profile rag up → tout
#    docker-compose up backend frontend        → front + back (db + ollama externes)
#    docker-compose up frontend                → front seul (back + db + ollama ailleurs)
# ============================================================================

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["db"]                           # Ne démarre que si --profile db ou si depends_on
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-ScribIA_Dev_2026!}"
      MSSQL_PID: "Developer"
    ports:
      - "${DB_EXPOSED_PORT:-1434}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11435}:11434"     # 11435 pour ne pas conflicte avec un ollama local
    environment:
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-0}"  # Libère la VRAM immédiatement après chaque appel (0 = pas de cache)
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-scribia-litellm}"
    depends_on:
      - ollama

  backend:
    build: ./backend
    env_file: .env
    environment:
      SCRIBIA_DB_HOST: "${SCRIBIA_DB_HOST:-db}"
      SCRIBIA_DB_PORT: "${SCRIBIA_DB_PORT:-1433}"
      SCRIBIA_DB_NAME: "${SCRIBIA_DB_NAME:-scribia}"
      SCRIBIA_DB_USER: "${SCRIBIA_DB_USER:-sa}"
      SCRIBIA_DB_PASSWORD: "${DB_PASSWORD:-ScribIA_Dev_2026!}"
      SCRIBIA_JWT_SECRET: "${JWT_SECRET:-CHANGE-ME-IN-PRODUCTION}"
      SCRIBIA_CORS_ORIGINS: "${SCRIBIA_CORS_ORIGINS:-http://localhost:3001,http://localhost:5173}"
      SCRIBIA_OLLAMA_URL: "${SCRIBIA_OLLAMA_URL:-http://ollama:11434}"
      SCRIBIA_LITELLM_URL: "${SCRIBIA_LITELLM_URL:-http://litellm:4000/v1}"
      SCRIBIA_LITELLM_API_KEY: "${LITELLM_MASTER_KEY:-sk-scribia-litellm}"
      SCRIBIA_RAG_API_URL: "${SCRIBIA_RAG_API_URL:-http://192.168.9.16:8000}"
      SCRIBIA_RAG_API_KEY: "${SCRIBIA_RAG_API_KEY:-}"
      SCRIBIA_USE_EXTERNAL_TRANSCRIPTION: "${SCRIBIA_USE_EXTERNAL_TRANSCRIPTION:-false}"
      # SCRIBIA_HF_TOKEN passé directement via env_file: .env
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend:/app
      - audio_data:/data/audio
      - prep_docs:/data/prep_docs
      - ai_docs:/data/ai_docs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3001}:80"

  # ── Services RAG-API ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles: ["rag"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["rag"]
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    profiles: ["rag"]
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mssql_data:
  audio_data:
  prep_docs:
  ai_docs:
  ollama_data:
  redis_data:
  qdrant_data:
  minio_data:
